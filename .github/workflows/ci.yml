name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  test:
    name: Test
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Run clippy
        run: nix develop --quiet --command cargo clippy

      - name: Check docs
        run: nix develop --quiet --command env RUSTDOCFLAGS="-D missing_docs" cargo doc --no-deps

      - name: Run tests
        run: nix develop --quiet --command cargo test

      - name: Check test coverage
        run: |
          nix develop --quiet --command cargo llvm-cov \
            --workspace \
            --all-features \
            --fail-under-functions 100 \
            --lcov \
            --output-path target/coverage.lcov
          if grep -Eq '^DA:[0-9]+,0$' target/coverage.lcov; then
            echo 'Coverage report contains uncovered source lines:'
            grep -E '^DA:[0-9]+,0$' target/coverage.lcov
            exit 1
          fi
